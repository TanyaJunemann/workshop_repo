<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upstream Bacon</title>
    <meta name="color-scheme" content="light dark" />

    <!-- Optional: favicon (uses your logo) -->
    <link rel="icon" type="image/png" href="./logo1.png" />

    <style>
      :root {
        /* Brand */
        --brandA: #3b82f6; /* blue */
        --brandB: #22c55e; /* green */
        --brandGlow: rgba(59, 130, 246, 0.28);

        /* Base */
        --bg0: #070b16;
        --bg1: #091a2a;

        --card: rgba(255, 255, 255, 0.06);
        --card2: rgba(255, 255, 255, 0.09);
        --stroke: rgba(255, 255, 255, 0.12);

        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.72);
        --muted2: rgba(255, 255, 255, 0.55);

        --ok: #38f27c;
        --bad: #ff4d4d;
        --warn: #ffd34d;

        --shadow: 0 20px 60px rgba(0, 0, 0, 0.55);
        --ring: 0 0 0 4px rgba(34, 197, 94, 0.16);
        --radius: 18px;
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg0: #f6f8ff;
          --bg1: #eaf2ff;

          --card: rgba(255, 255, 255, 0.85);
          --card2: rgba(255, 255, 255, 0.98);
          --stroke: rgba(20, 30, 60, 0.12);

          --text: rgba(10, 15, 30, 0.9);
          --muted: rgba(10, 15, 30, 0.7);
          --muted2: rgba(10, 15, 30, 0.55);

          --shadow: 0 18px 50px rgba(10, 15, 30, 0.12);
          --ring: 0 0 0 4px rgba(34, 197, 94, 0.18);
          --brandGlow: rgba(59, 130, 246, 0.20);
        }
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        color: var(--text);
        background:
          radial-gradient(1000px 700px at 12% 12%, var(--brandGlow), transparent 55%),
          radial-gradient(900px 700px at 88% 18%, rgba(34, 197, 94, 0.18), transparent 55%),
          radial-gradient(1000px 900px at 50% 100%, rgba(59, 130, 246, 0.14), transparent 60%),
          linear-gradient(160deg, var(--bg0), var(--bg1));
        overflow-x: hidden;
      }

      .wrap {
        max-width: 1080px;
        margin: 0 auto;
        padding: 30px 18px 60px;
      }

      header {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 18px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 260px;
      }

      .logo {
        width: 120px;
        height: 120px;
        border-radius: 12px;
        object-fit: contain;
        background: var(--card2);
        border: 1px solid var(--stroke);
        box-shadow: 0 10px 30px rgba(0,0,0,0.18);
        padding: 6px;
      }

      .title {
        display: grid;
        gap: 2px;
      }

      h1 {
        margin: 0;
        font-size: clamp(22px, 2.6vw, 30px);
        letter-spacing: -0.02em;
        line-height: 1.1;
      }

      .sub {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
      }

      .panel {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        justify-content: flex-end;
      }

      .pill {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        padding: 10px 12px;
        border-radius: 999px;
        background: var(--card);
        border: 1px solid var(--stroke);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      .pill strong {
        font-weight: 650;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--warn);
        box-shadow: 0 0 0 4px rgba(255, 211, 77, 0.15);
      }
      .dot.ok {
        background: var(--ok);
        box-shadow: var(--ring);
      }
      .dot.bad {
        background: var(--bad);
        box-shadow: 0 0 0 4px rgba(255, 77, 77, 0.18);
      }

      .controls {
        display: flex;
        gap: 10px;
        align-items: center;
        padding: 10px 12px;
        border-radius: 999px;
        background: var(--card);
        border: 1px solid var(--stroke);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      input[type="search"] {
        width: min(44vw, 340px);
        min-width: 220px;
        max-width: 440px;
        padding: 10px 12px;
        border-radius: 999px;
        border: 1px solid var(--stroke);
        background: var(--card2);
        color: var(--text);
        outline: none;
      }

      input[type="search"]::placeholder {
        color: var(--muted2);
      }

      button {
        appearance: none;
        border: 1px solid var(--stroke);
        background: linear-gradient(135deg, rgba(59,130,246,0.18), rgba(34,197,94,0.10));
        color: var(--text);
        padding: 10px 12px;
        border-radius: 999px;
        cursor: pointer;
        transition: transform 120ms ease, filter 120ms ease;
      }

      button:hover {
        transform: translateY(-1px);
        filter: brightness(1.06);
      }
      button:active {
        transform: translateY(0px);
      }

      .grid {
        margin-top: 16px;
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 12px;
      }

      .card {
        grid-column: span 6;
        border-radius: var(--radius);
        background: var(--card);
        border: 1px solid var(--stroke);
        box-shadow: var(--shadow);
        padding: 14px 14px 12px;
        display: flex;
        gap: 12px;
        align-items: flex-start;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        position: relative;
        overflow: hidden;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: -40px;
        background:
          radial-gradient(300px 170px at 12% 10%, rgba(59, 130, 246, 0.20), transparent 60%),
          radial-gradient(280px 180px at 88% 20%, rgba(34, 197, 94, 0.16), transparent 60%);
        pointer-events: none;
        opacity: 0.95;
      }

      .card > * {
        position: relative;
      }

      @media (max-width: 780px) {
        .card {
          grid-column: span 12;
        }
      }

      .icon {
        width: 40px;
        height: 40px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        border: 1px solid var(--stroke);
        background: var(--card2);
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 13px;
        border: 1px solid var(--stroke);
        background: rgba(255, 255, 255, 0.05);
      }

      .badge-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--warn);
      }

      .status.ok {
        background: rgba(56, 242, 124, 0.08);
      }
      .status.ok .badge-dot {
        background: var(--ok);
      }
      .status.bad {
        background: rgba(255, 77, 77, 0.10);
      }
      .status.bad .badge-dot {
        background: var(--bad);
      }

      .meta {
        display: grid;
        gap: 6px;
        min-width: 0;
        flex: 1;
      }

      .name {
        font-weight: 650;
        letter-spacing: -0.01em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .details {
        display: flex;
        gap: 10px;
        align-items: center;
        color: var(--muted);
        font-size: 13px;
        flex-wrap: wrap;
      }

      .footer {
        margin-top: 18px;
        color: var(--muted2);
        font-size: 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
      }

      .error {
        margin-top: 14px;
        padding: 12px 14px;
        border-radius: var(--radius);
        border: 1px solid rgba(255, 77, 77, 0.35);
        background: rgba(255, 77, 77, 0.10);
        color: var(--text);
        display: none;
      }

      .skeleton {
        animation: pulse 1.2s ease-in-out infinite;
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.05),
          rgba(255, 255, 255, 0.12),
          rgba(255, 255, 255, 0.05)
        );
        background-size: 200% 100%;
      }

      @keyframes pulse {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }

      .sk-line {
        height: 12px;
        border-radius: 999px;
      }
      .sk-line.lg {
        height: 14px;
        width: 60%;
      }
      .sk-line.sm {
        width: 40%;
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <header>
        <div class="brand">
          <!-- Put logo1.png next to this HTML file -->
          <img class="logo" src="./logo1.png" alt="Upstream Bacon logo" />
          <div class="title">
            <h1>Upstream Bacon</h1>
            <p class="sub">Real-time service uptime & incident visibility</p>
          </div>
        </div>

        <div class="panel">
          <div class="pill" id="summaryPill" title="Overall status">
            <span class="dot" id="overallDot"></span>
            <span
              ><strong id="overallText">Loading</strong> ·
              <span id="countsText">—</span></span
            >
          </div>

          <div class="controls">
            <input
              id="search"
              type="search"
              placeholder="Search services…"
              autocomplete="off"
            />
            <button id="refreshBtn" type="button" title="Refresh now">
              Refresh
            </button>
          </div>
        </div>
      </header>

      <div class="error" id="errorBox"></div>

      <section class="grid" id="grid" aria-live="polite"></section>

      <div class="footer">
        <span id="updatedText">Last updated: —</span>
        <span>Auto-refresh: <strong id="autoText">15s</strong></span>
      </div>
    </div>

    <script>
      // === CONFIG ===
      const API_URL =
        "https://spathose-hygienically-sarita.ngrok-free.dev/services?ngrok-skip-browser-warning=1";
      const AUTO_REFRESH_MS = 15000;

      // === STATE ===
      let services = [];
      let timer = null;
      let lastUpdated = null;

      // === DOM ===
      const grid = document.getElementById("grid");
      const search = document.getElementById("search");
      const refreshBtn = document.getElementById("refreshBtn");
      const errorBox = document.getElementById("errorBox");

      const overallDot = document.getElementById("overallDot");
      const overallText = document.getElementById("overallText");
      const countsText = document.getElementById("countsText");
      const updatedText = document.getElementById("updatedText");
      const autoText = document.getElementById("autoText");

      autoText.textContent = `${Math.round(AUTO_REFRESH_MS / 1000)}s`;

      function setError(message, html = false) {
        if (!message) {
          errorBox.style.display = "none";
          errorBox.textContent = "";
          errorBox.innerHTML = "";
          return;
        }
        errorBox.style.display = "block";
        if (html) errorBox.innerHTML = message;
        else errorBox.textContent = message;
      }

      function fmtTime(d) {
        try {
          return new Intl.DateTimeFormat(undefined, {
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
            year: "numeric",
            month: "short",
            day: "2-digit",
          }).format(d);
        } catch {
          return d.toLocaleString();
        }
      }

      function escapeHtml(str) {
        return String(str)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function iconSVG(up) {
        if (up) {
          return `
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
            </svg>`;
        }
        return `
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 9v4" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" />
            <path d="M12 17h.01" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" />
            <path d="M10.3 4.3c.7-1.1 2.7-1.1 3.4 0l8.1 12.7c.8 1.2-.1 2.8-1.7 2.8H3.9c-1.6 0-2.5-1.6-1.7-2.8L10.3 4.3Z" stroke="currentColor" stroke-width="2.2" stroke-linejoin="round" />
          </svg>`;
      }

      function renderSkeleton() {
        grid.innerHTML = "";
        for (let i = 0; i < 6; i++) {
          const el = document.createElement("div");
          el.className = "card";
          el.innerHTML = `
            <div class="icon skeleton"></div>
            <div class="meta">
              <div class="sk-line lg skeleton"></div>
              <div class="details">
                <span class="sk-line sm skeleton" style="width:120px"></span>
                <span class="sk-line sm skeleton" style="width:160px"></span>
              </div>
            </div>`;
          grid.appendChild(el);
        }
      }

      function updateSummary(items) {
        const upCount = items.filter((s) => !!s.up).length;
        const downCount = items.length - upCount;

        countsText.textContent = `${upCount} up · ${downCount} down`;

        if (items.length === 0) {
          overallDot.className = "dot";
          overallText.textContent = "No matches";
          return;
        }

        if (downCount === 0) {
          overallDot.className = "dot ok";
          overallText.textContent = "All systems operational";
        } else {
          overallDot.className = "dot bad";
          overallText.textContent = "Degraded / Outage";
        }
      }

      function render() {
        const q = search.value.trim().toLowerCase();
        const filtered = q
          ? services.filter((s) => (s.name || "").toLowerCase().includes(q))
          : services;

        updateSummary(filtered);

        grid.innerHTML = "";
        for (const s of filtered) {
          const up = !!s.up;
          const card = document.createElement("div");
          card.className = "card";

          const statusClass = up ? "status ok" : "status bad";
          const statusText = up ? "Operational" : "Down";

          card.innerHTML = `
            <div class="icon" style="color:${up ? "var(--ok)" : "var(--bad)"}">
              ${iconSVG(up)}
            </div>
            <div class="meta">
              <div class="name" title="${(s.name || "").replaceAll('"', "&quot;")}">${s.name || "(unnamed service)"}</div>
              <div class="details">
                <span class="${statusClass}"><span class="badge-dot"></span>${statusText}</span>
                <span style="color: var(--muted2)">API: ${new URL(API_URL).host}</span>
              </div>
            </div>
          `;

          grid.appendChild(card);
        }

        if (lastUpdated) {
          updatedText.textContent = `Last updated: ${fmtTime(lastUpdated)}`;
        }
      }

      async function load() {
        setError("");

        const base =
          "https://spathose-hygienically-sarita.ngrok-free.dev/services";
        const urls = [
          API_URL,
          `${API_URL}&t=${Date.now()}`,
          `${base}?ngrok-skip-browser-warning=1&t=${Date.now()}`,
        ];

        async function tryFetch(url, withNgrokHeader) {
          const headers = { Accept: "application/json" };
          if (withNgrokHeader) headers["ngrok-skip-browser-warning"] = "1";

          const res = await fetch(url, {
            cache: "no-store",
            redirect: "follow",
            headers,
            credentials: "omit",
          });

          if (!res.ok) throw new Error(`HTTP ${res.status}`);

          const ct = (res.headers.get("content-type") || "").toLowerCase();
          const text = await res.text();
          return { ct, text, url };
        }

        try {
          let last;

          for (const u of urls) {
            last = await tryFetch(u, false);
            if (
              last.ct.includes("application/json") ||
              last.text.trim().startsWith("{")
            ) {
              const data = JSON.parse(last.text);
              if (!data || !Array.isArray(data.services)) {
                throw new Error(
                  "Unexpected JSON shape. Expected { services: [...] }."
                );
              }

              services = data.services
                .map((x) => ({ name: String(x.name ?? ""), up: !!x.up }))
                .sort((a, b) => a.name.localeCompare(b.name));

              lastUpdated = new Date();
              render();
              return;
            }
          }

          for (const u of urls) {
            last = await tryFetch(u, true);
            if (
              last.ct.includes("application/json") ||
              last.text.trim().startsWith("{")
            ) {
              const data = JSON.parse(last.text);
              if (!data || !Array.isArray(data.services)) {
                throw new Error(
                  "Unexpected JSON shape. Expected { services: [...] }."
                );
              }

              services = data.services
                .map((x) => ({ name: String(x.name ?? ""), up: !!x.up }))
                .sort((a, b) => a.name.localeCompare(b.name));

              lastUpdated = new Date();
              render();
              return;
            }
          }

          const hint = (last?.text || "").slice(0, 220);
          const openUrl = `${base}?ngrok-skip-browser-warning=1`;

          setError(
            `
              <div style="display:grid;gap:8px">
                <div><strong>Couldn’t read JSON</strong> — the endpoint is returning HTML to your browser.</div>
                <div style="color:var(--muted)">This can happen with ngrok until you accept the warning once in your browser.</div>
                <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
                  <a href="${openUrl}" target="_blank" rel="noreferrer" style="
                    display:inline-flex;align-items:center;gap:8px;
                    padding:10px 12px;border-radius:999px;
                    border:1px solid var(--stroke);
                    background: var(--card2);
                    color: var(--text);
                    text-decoration:none;">
                    Open API in new tab
                  </a>
                  <button id="retryBtn" type="button">Retry</button>
                </div>
                <div style="font-size:12px;color:var(--muted2)">First characters returned: <code>${escapeHtml(
                  JSON.stringify(hint)
                )}</code></div>
              </div>
            `,
            true
          );

          const retryBtn = document.getElementById("retryBtn");
          if (retryBtn) retryBtn.addEventListener("click", load);
        } catch (err) {
          setError(
            `Could not load service health from ${API_URL}. ` +
              `If this page is hosted on a different domain, enable CORS on the API. ` +
              `Details: ${err?.message || err}`
          );
        }
      }

      function startTimer() {
        if (timer) clearInterval(timer);
        timer = setInterval(load, AUTO_REFRESH_MS);
      }

      search.addEventListener("input", render);
      refreshBtn.addEventListener("click", load);

      renderSkeleton();
      load();
      startTimer();
    </script>
  </body>
</html>
